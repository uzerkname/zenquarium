<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zenquarium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Design System ─────────────────────────────────── */
    :root {
      --glass-bg: rgba(12, 14, 24, 0.72);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-blur: 24px;
      --accent: #64b5f6;
      --accent-glow: rgba(100, 181, 246, 0.2);
      --text-primary: rgba(255, 255, 255, 0.95);
      --text-secondary: rgba(255, 255, 255, 0.5);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.35), 0 1px 2px rgba(0, 0, 0, 0.2);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #canvas { display: block; width: 100vw; height: 100vh; }

    /* ── UI Root ───────────────────────────────────────── */
    #ui-root {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    #ui-root > * { pointer-events: all; }

    /* ── HUD ───────────────────────────────────────────── */
    #hud {
      position: absolute;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      align-items: center;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      padding: 8px 24px;
      pointer-events: none;
      box-shadow: var(--shadow);
    }
    #hud span {
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }
    .hud-divider {
      width: 1px;
      height: 14px;
      background: rgba(255, 255, 255, 0.12);
    }
    #mode-indicator {
      color: #81c784 !important;
      text-transform: uppercase;
      font-size: 10px !important;
      font-weight: 700;
      letter-spacing: 1.2px;
    }

    /* ── Panels ────────────────────────────────────────── */
    .panel {
      position: absolute;
      top: 72px;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 16px;
      width: 200px;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
      box-shadow: var(--shadow);
    }
    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    .panel::-webkit-scrollbar-track { background: transparent; }
    #sidebar-left  { left: 16px; }
    #sidebar-right { right: 16px; }

    .panel-title {
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--glass-border);
    }

    /* ── Cards ──────────────────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .species-card, .deco-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: var(--radius-md);
      padding: 10px 6px 8px;
      cursor: pointer;
      text-align: center;
      transition: all var(--transition);
      user-select: none;
    }
    .species-card:hover, .deco-card:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
    }
    .species-card:active, .deco-card:active {
      transform: translateY(0);
      background: rgba(255, 255, 255, 0.1);
    }
    .deco-active {
      border-color: rgba(255, 183, 77, 0.5) !important;
      box-shadow: 0 0 12px rgba(255, 183, 77, 0.15) !important;
      background: rgba(255, 183, 77, 0.06) !important;
    }
    .card-emoji { font-size: 24px; display: block; margin-bottom: 4px; }
    .card-preview {
      width: 48px;
      height: 48px;
      display: block;
      margin: 0 auto 4px;
      image-rendering: auto;
      pointer-events: none;
    }
    .card-name {
      color: var(--text-primary);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2px;
      line-height: 1.3;
    }
    .card-count {
      display: inline-block;
      margin-top: 4px;
      background: var(--accent-glow);
      color: var(--accent);
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 10px;
      font-weight: 600;
    }

    /* ── Card Buttons ──────────────────────────────────── */
    .card-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      border-radius: 6px;
      padding: 3px 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      transition: all var(--transition);
      line-height: 1.4;
    }
    .card-btn:hover { background: rgba(255, 255, 255, 0.1); }
    .card-btn.add { color: #81c784; border-color: rgba(129, 199, 132, 0.15); }
    .card-btn.add:hover { background: rgba(129, 199, 132, 0.12); }
    .card-btn.remove { color: #e57373; border-color: rgba(229, 115, 115, 0.15); }
    .card-btn.remove:hover { background: rgba(229, 115, 115, 0.12); }

    /* ── Mode Bar ──────────────────────────────────────── */
    #mode-bar {
      display: none !important; /* hidden for now — was display:flex */
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      gap: 4px;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      padding: 6px 8px;
      box-shadow: var(--shadow);
    }
    .mode-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 18px;
      border-radius: 100px;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: all var(--transition);
      position: relative;
    }
    .mode-btn:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.05);
    }
    .mode-btn.active {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      font-weight: 600;
    }
    .mode-btn .soon {
      position: absolute;
      top: -5px; right: 2px;
      background: rgba(255, 183, 77, 0.9);
      color: #000;
      font-size: 7px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }

    /* ── Placement Hint ────────────────────────────────── */
    #placement-hint {
      display: none;
      position: absolute;
      bottom: 76px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid rgba(255, 183, 77, 0.25);
      color: #ffb74d;
      font-size: 12px;
      font-weight: 500;
      padding: 8px 20px;
      border-radius: 100px;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }
    #placement-hint.visible { display: block; }

    /* ── Light Controls ────────────────────────────────── */
    #light-control {
      position: absolute;
      bottom: 20px;
      right: 16px;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
    }
    .light-label {
      color: var(--text-secondary);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }
    .color-presets {
      display: flex;
      gap: 6px;
    }
    .color-preset {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all var(--transition);
      padding: 0;
      outline: none;
    }
    .color-preset:hover {
      border-color: rgba(255, 255, 255, 0.35);
      transform: scale(1.15);
    }
    .color-preset.active {
      border-color: rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
    }
    #custom-color {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      cursor: pointer;
      background: none;
      padding: 0;
      overflow: hidden;
      transition: all var(--transition);
    }
    #custom-color:hover {
      border-color: rgba(255, 255, 255, 0.35);
      transform: scale(1.15);
    }
    #custom-color::-webkit-color-swatch-wrapper { padding: 0; }
    #custom-color::-webkit-color-swatch { border: none; border-radius: 50%; }
    #custom-color::-moz-color-swatch { border: none; border-radius: 50%; }

    /* ── Room Light Toggle ──────────────────────────────── */
    .light-divider {
      width: 1px;
      height: 18px;
      background: rgba(255, 255, 255, 0.12);
    }
    #room-light-toggle {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 100px;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }
    #room-light-toggle:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.2);
    }
    #room-light-toggle.off {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-secondary);
      border-color: rgba(255, 255, 255, 0.06);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="ui-root">
    <div id="hud" style="display:none">
      <span id="fish-count">0 fish</span>
      <div class="hud-divider"></div>
      <span id="mode-indicator">Sandbox</span>
    </div>
    <div id="sidebar-left" class="panel"></div>
    <div id="sidebar-right" class="panel"></div>
    <div id="mode-bar"></div>
    <div id="placement-hint">Click to place &middot; Right-click to rotate &middot; Esc to cancel</div>
    <div id="light-control">
      <span class="light-label">Lights</span>
      <div class="color-presets">
        <button class="color-preset active" data-color="#ffffff" style="background:#ffffff" title="White"></button>
        <button class="color-preset" data-color="#64b5f6" style="background:#64b5f6" title="Cool Blue"></button>
        <button class="color-preset" data-color="#81c784" style="background:#81c784" title="Green"></button>
        <button class="color-preset" data-color="#e57373" style="background:#e57373" title="Red"></button>
        <button class="color-preset" data-color="#ffb74d" style="background:#ffb74d" title="Warm"></button>
        <button class="color-preset" data-color="#ce93d8" style="background:#ce93d8" title="Purple"></button>
      </div>
      <input type="color" id="custom-color" value="#ffffff" title="Custom color">
      <div class="light-divider"></div>
      <button id="room-light-toggle" title="Toggle room lights">Room: On</button>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
